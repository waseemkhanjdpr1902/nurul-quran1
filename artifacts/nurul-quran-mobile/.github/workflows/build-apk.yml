name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create or link Expo project
        run: eas init --non-interactive

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Build complete
        run: |
          echo "APK build submitted!"
          echo "Download from: https://expo.dev/accounts/waseemkhanjdpr/projects/nurul-quran-mobile/builds"
