kind = "mobile"
previewPath = "/mobile/"
title = "Nurul Quran Mobile"
version = "1.0.0"
id = "artifacts/nurul-quran-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21581

[services.development]
run = "pnpm --filter @workspace/nurul-quran-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nurul-quran-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nurul-quran-mobile", "run", "serve" ]

[services.env]
PORT = "21581"
BASE_PATH = "/mobile/"
