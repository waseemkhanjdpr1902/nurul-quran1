kind = "web"
previewPath = "/inventory/"
title = "Inventory AI Pro"
version = "1.0.0"
id = "artifacts/inventory-ai-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/inventory/" ]
localPort = 21971

[services.development]
run = "pnpm --filter @workspace/inventory-ai-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inventory-ai-pro", "run", "build" ]
publicDir = "artifacts/inventory-ai-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21971"
BASE_PATH = "/inventory/"
