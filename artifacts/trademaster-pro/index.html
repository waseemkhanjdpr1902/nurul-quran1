<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>TradeMaster Pro — Trading Journal &amp; Analytics</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1a6b4a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TradeMaster" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="./icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="./icons/icon-128.png" />

    <!-- SEO & Social -->
    <meta name="description" content="Professional trading journal and analytics dashboard for Indian traders. Track P&L, analyze performance, calculate position size, and study technical levels — 100% SEBI-compliant SaaS tool." />
    <meta name="keywords" content="trading journal, P&L tracker, position sizing, option greeks, pivot points, fibonacci, intraday, nifty, banknifty, SEBI" />
    <meta property="og:title" content="TradeMaster Pro — Trading Journal &amp; Analytics" />
    <meta property="og:description" content="Track your trades, analyze P&L, calculate position size, and study technical levels. A professional SaaS tool for serious Indian traders." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TradeMaster Pro" />
    <meta name="twitter:description" content="Professional trading journal and P&L analytics for Indian traders." />

    <!-- Windows tile -->
    <meta name="msapplication-navbutton-color" content="#1a6b4a" />
    <meta name="msapplication-TileColor" content="#1a6b4a" />
    <meta name="msapplication-TileImage" content="./icons/icon-144.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('./sw.js', { scope: './' })
            .then(reg => console.log('[SW] TradeMaster registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
