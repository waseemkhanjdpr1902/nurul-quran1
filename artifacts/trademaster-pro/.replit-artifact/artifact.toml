kind = "web"
previewPath = "/trademaster/"
title = "TradeMaster Pro"
version = "1.0.0"
id = "artifacts/trademaster-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/trademaster/" ]
localPort = 21140

[services.development]
run = "pnpm --filter @workspace/trademaster-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trademaster-pro", "run", "build" ]
publicDir = "artifacts/trademaster-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21140"
BASE_PATH = "/trademaster/"
