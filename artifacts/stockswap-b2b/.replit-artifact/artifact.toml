kind = "web"
previewPath = "/stockswap/"
title = "StockSwap B2B"
version = "1.0.0"
id = "artifacts/stockswap-b2b"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/stockswap/" ]
localPort = 18674

[services.development]
run = "pnpm --filter @workspace/stockswap-b2b run dev"

[services.production]
