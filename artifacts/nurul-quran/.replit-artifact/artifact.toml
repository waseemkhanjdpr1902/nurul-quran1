kind = "web"
previewPath = "/"
title = "Nurul Quran"
version = "1.0.0"
id = "artifacts/nurul-quran"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20246

[services.development]
run = "pnpm --filter @workspace/nurul-quran run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nurul-quran", "run", "build" ]
publicDir = "artifacts/nurul-quran/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20246"
BASE_PATH = "/"
