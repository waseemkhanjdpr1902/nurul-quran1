<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Nurul Quran — Islamic Education</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#004d40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nurul Quran" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.svg" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.svg" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.svg" />

    <!-- SEO & Social -->
    <meta name="description" content="Authentic Islamic lectures, Quran recitation, structured courses, and Halal investment guidance — all in one app." />
    <meta name="keywords" content="Islam, Quran, Islamic lectures, hadith, tafseer, fiqh, halal stocks, Islamic education" />
    <meta property="og:title" content="Nurul Quran — Islamic Education" />
    <meta property="og:description" content="Authentic Islamic lectures, Quran recitation, courses, and Halal investment guidance." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nurul Quran" />
    <meta name="twitter:description" content="Authentic Islamic education — lectures, Quran recitation, and Halal stocks." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Splash screen / Windows tile -->
    <meta name="msapplication-navbutton-color" content="#004d40" />
    <meta name="msapplication-TileColor" content="#004d40" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Amiri+Quran&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
