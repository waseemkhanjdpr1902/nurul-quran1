openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nurul Quran API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lectures
    description: Lecture operations
  - name: courses
    description: Course operations
  - name: speakers
    description: Speaker operations
  - name: users
    description: User operations
  - name: ayah
    description: Daily Ayah operations
  - name: payments
    description: Payment and subscription operations
  - name: inventory
    description: Inventory management operations
  - name: stockswap
    description: StockSwap B2B marketplace operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /lectures:
    get:
      operationId: getLectures
      tags: [lectures]
      summary: List all lectures
      description: Returns lectures with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: speakerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: language
          in: query
          schema:
            type: ["string", "null"]
            enum: ["English", "Urdu", null]
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: isPremium
          in: query
          schema:
            type: ["boolean", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of lectures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureListResponse"

  /lectures/recent:
    get:
      operationId: getRecentLectures
      tags: [lectures]
      summary: Get recent lectures
      description: Returns the most recently added lectures
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Recent lectures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lecture"

  /lectures/featured:
    get:
      operationId: getFeaturedLectures
      tags: [lectures]
      summary: Get featured lectures
      description: Returns featured/highlighted lectures for the home page
      responses:
        "200":
          description: Featured lectures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lecture"

  /lectures/{id}:
    get:
      operationId: getLecture
      tags: [lectures]
      summary: Get a single lecture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lecture detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lecture"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: List all courses
      description: Returns all courses with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: isPremium
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a single course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /speakers:
    get:
      operationId: getSpeakers
      tags: [speakers]
      summary: List all speakers
      responses:
        "200":
          description: List of speakers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Speaker"

  /ayah/daily:
    get:
      operationId: getDailyAyah
      tags: [ayah]
      summary: Get today's daily Ayah
      description: Returns the Ayah of the day
      responses:
        "200":
          description: Daily Ayah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyAyah"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [lectures]
      summary: Get dashboard summary stats
      description: Returns counts and summary data for the home page
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUserBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/logout:
    post:
      operationId: logoutUser
      tags: [users]
      summary: Logout a user
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/favorites:
    get:
      operationId: getUserFavorites
      tags: [users]
      summary: Get user's favorite lectures
      responses:
        "200":
          description: Favorite lectures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lecture"

  /users/favorites/{lectureId}:
    post:
      operationId: addFavorite
      tags: [users]
      summary: Add lecture to favorites
      parameters:
        - name: lectureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: removeFavorite
      tags: [users]
      summary: Remove lecture from favorites
      parameters:
        - name: lectureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed from favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/recently-played:
    get:
      operationId: getRecentlyPlayed
      tags: [users]
      summary: Get recently played lectures
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recently played lectures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lecture"

  /users/recently-played/{lectureId}:
    post:
      operationId: addRecentlyPlayed
      tags: [users]
      summary: Record a lecture play
      parameters:
        - name: lectureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /payments/create-checkout-session:
    post:
      operationId: createCheckoutSession
      tags: [payments]
      summary: Create a Stripe checkout session for donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionBody"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/create-subscription:
    post:
      operationId: createSubscription
      tags: [payments]
      summary: Create a Stripe subscription session for premium
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "200":
          description: Subscription session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/webhook:
    post:
      operationId: stripeWebhook
      tags: [payments]
      summary: Handle Stripe webhook events
      responses:
        "200":
          description: Webhook handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /inventory/products:
    get:
      operationId: listInventoryProducts
      tags: [inventory]
      summary: List all inventory products
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
  /stockswap/auth/register:
    post:
      operationId: stockswapRegister
      tags: [stockswap]
      summary: Register or login a StockSwap user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: ["string", "null"]
                phone:
                  type: ["string", "null"]
                password:
                  type: string
              required:
                - password
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapAuthResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockswap/auth/terms:
    post:
      operationId: stockswapAcceptTerms
      tags: [stockswap]
      summary: Accept terms of service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTermsBody"
      responses:
        "200":
          description: Terms accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stockswap/shops:
    post:
      operationId: stockswapCreateShop
      tags: [stockswap]
      summary: Create a shop for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShopBody"
      responses:
        "201":
          description: Shop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"

  /stockswap/shops/me:
    get:
      operationId: stockswapGetMyShop
      tags: [stockswap]
      summary: Get my shop
      responses:
        "200":
          description: My shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"
        "404":
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockswap/shops/{shopId}:
    get:
      operationId: stockswapGetShop
      tags: [stockswap]
      summary: Get a shop by ID
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"

  /stockswap/listings:
    get:
      operationId: stockswapGetListings
      tags: [stockswap]
      summary: Browse nearby listings
      parameters:
        - name: lat
          in: query
          schema:
            type: ["number", "null"]
        - name: lng
          in: query
          schema:
            type: ["number", "null"]
        - name: radiusKm
          in: query
          schema:
            type: number
            default: 10
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: lowStock
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryProduct"
    post:
      operationId: createInventoryProduct
      tags: [inventory]
      summary: Create a new inventory product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryProduct"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Free tier limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/products/{id}:
    get:
      operationId: getInventoryProduct
      tags: [inventory]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryProduct"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateInventoryProduct
      tags: [inventory]
      summary: Update an existing product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryProduct"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInventoryProduct
      tags: [inventory]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/scan:
    post:
      operationId: scanInventoryItem
      tags: [inventory]
      summary: Scan an item via camera image or barcode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInventoryItemBody"
      responses:
        "200":
          description: Scan result with suggested product name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanInventoryItemResponse"

  /inventory/audit-logs:
    get:
      operationId: listInventoryAuditLogs
      tags: [inventory]
      summary: List audit log entries
      parameters:
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryAuditLog"

  /inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [inventory]
      summary: Get products with low stock
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryProduct"

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory dashboard summary stats
      responses:
        "200":
          description: Inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  /inventory/create-checkout-session:
    post:
      operationId: createInventoryCheckoutSession
      tags: [inventory]
      summary: Create Stripe checkout for Inventory AI Pro subscription
  /stockswap/listings:
    get:
      operationId: stockswapGetListings
      tags: [stockswap]
      summary: Browse nearby listings
      parameters:
        - name: lat
          in: query
          schema:
            type: ["number", "null"]
        - name: lng
          in: query
          schema:
            type: ["number", "null"]
        - name: radiusKm
          in: query
          schema:
            type: number
            default: 10
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: "#/components/schemas/StockSwapListing"
                  total:
                    type: integer
                required:
                  - listings
                  - total
    post:
      operationId: stockswapCreateListing
      tags: [stockswap]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryCheckoutBody"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/webhook:
    post:
      operationId: inventoryStripeWebhook
      tags: [inventory]
      summary: Handle Stripe webhook for inventory subscription
      responses:
        "200":
          description: Webhook handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /inventory/billing-portal:
    post:
      operationId: createInventoryBillingPortal
      tags: [inventory]
      summary: Create Stripe billing portal session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingPortalBody"
      responses:
        "200":
          description: Billing portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResponse"

  /stockswap/auth/register:
    post:
      operationId: stockswapRegister
      tags: [stockswap]
      summary: Register or login a StockSwap user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: ["string", "null"]
                phone:
                  type: ["string", "null"]
                password:
                  type: string
              required:
                - password
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapAuthResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockswap/auth/terms:
    post:
      operationId: stockswapAcceptTerms
      tags: [stockswap]
      summary: Accept terms of service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTermsBody"
      responses:
        "200":
          description: Terms accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stockswap/shops:
    post:
      operationId: stockswapCreateShop
      tags: [stockswap]
      summary: Create a shop for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShopBody"
      responses:
        "201":
          description: Shop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"

  /stockswap/shops/me:
    get:
      operationId: stockswapGetMyShop
      tags: [stockswap]
      summary: Get my shop
      responses:
        "200":
          description: My shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"
        "404":
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockswap/shops/{shopId}:
    get:
      operationId: stockswapGetShop
      tags: [stockswap]
      summary: Get a shop by ID
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"

  /stockswap/listings/mine:
    get:
      operationId: stockswapGetMyListings
      tags: [stockswap]
      summary: Get my shop's listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSwapListing"

  /stockswap/listings/{listingId}:
    get:
      operationId: stockswapGetListing
      tags: [stockswap]
      summary: Get a listing by ID
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapListing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: stockswapDeleteListing
      tags: [stockswap]
      summary: Delete a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stockswap/listings/{listingId}/boost:
    post:
      operationId: stockswapBoostListing
      tags: [stockswap]
      summary: Create Stripe checkout to boost a listing for $1
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                successUrl:
                  type: string
                cancelUrl:
                  type: string
              required:
                - successUrl
                - cancelUrl
      responses:
        "200":
          description: Checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoostListingResponse"

  /stockswap/listings/{listingId}/messages:
    get:
      operationId: stockswapGetMessages
      tags: [stockswap]
      summary: Get chat messages for a listing thread
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: peerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSwapMessage"
    post:
      operationId: stockswapSendMessage
      tags: [stockswap]
      summary: Send a chat message
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapMessage"

  /stockswap/ai/suggest:
    post:
      operationId: stockswapAISuggest
      tags: [stockswap]
      summary: Get AI category and brand suggestion from image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageBase64:
                  type: string
              required:
                - imageBase64
      responses:
        "200":
          description: AI suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestionResponse"

  /stockswap/admin/verify-shop:
    post:
      operationId: stockswapVerifyShop
      tags: [stockswap]
      summary: Admin — verify a shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shopId:
                  type: string
                adminKey:
                  type: string
              required:
                - shopId
                - adminKey
      responses:
        "200":
          description: Shop verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapShop"

  /stockswap/upload:
    post:
      operationId: stockswapUploadImage
      tags: [stockswap]
      summary: Upload listing image (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageBase64:
                  type: string
                fileName:
                  type: string
              required:
                - imageBase64
                - fileName
      responses:
        "200":
          description: Image URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required:
                  - url
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSwapListing"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    Speaker:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        lectureCount:
          type: integer
      required:
        - id
        - name
        - lectureCount

    Lecture:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        audioUrl:
          type: string
        duration:
          type: ["integer", "null"]
        language:
          type: string
        category:
          type: string
        isPremium:
          type: boolean
        isFeatured:
          type: boolean
        playCount:
          type: integer
        thumbnailUrl:
          type: ["string", "null"]
        speakerId:
          type: ["integer", "null"]
        speakerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - audioUrl
        - language
        - category
        - isPremium
        - isFeatured
        - playCount
        - createdAt

    LectureListResponse:
      type: object
      properties:
        lectures:
          type: array
          items:
            $ref: "#/components/schemas/Lecture"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - lectures
        - total
        - limit
        - offset

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        isPremium:
          type: boolean
        lectureCount:
          type: integer
        thumbnailUrl:
          type: ["string", "null"]
        speakerId:
          type: ["integer", "null"]
        speakerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - category
        - isPremium
        - lectureCount
        - createdAt

    DailyAyah:
      type: object
      properties:
        id:
          type: integer
        arabicText:
          type: string
        translation:
          type: string
        surahName:
          type: string
        surahNumber:
          type: integer
        ayahNumber:
          type: integer
        reference:
          type: string
      required:
        - id
        - arabicText
        - translation
        - surahName
        - surahNumber
        - ayahNumber
        - reference

    DashboardSummary:
      type: object
      properties:
        totalLectures:
          type: integer
        totalCourses:
          type: integer
        totalSpeakers:
          type: integer
        totalListeners:
          type: integer
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalLectures
        - totalCourses
        - totalSpeakers
        - totalListeners
        - categories

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        isPremium:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - isPremium
        - createdAt

    RegisterUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    CreateCheckoutSessionBody:
      type: object
      properties:
        amount:
          type: integer
          description: Amount in cents
        currency:
          type: string
          default: usd
        successUrl:
          type: string
        cancelUrl:
          type: string
      required:
        - amount
        - successUrl
        - cancelUrl

    CreateSubscriptionBody:
      type: object
      properties:
        successUrl:
          type: string
        cancelUrl:
          type: string
        userId:
          type: ["integer", "null"]
      required:
        - successUrl
        - cancelUrl

    CheckoutSessionResponse:
      type: object
      properties:
        url:
          type: string
        sessionId:
          type: string
      required:
        - url
        - sessionId

    InventoryProduct:
      type: object
      properties:
        id:
          type: integer
    StockSwapShop:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        sku:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - quantity
        - unitPrice
        - createdAt
        - updatedAt

    CreateInventoryProductBody:
      type: object
      properties:
        name:
          type: string
        sku:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        quantity:
          type: integer
          default: 0
        unitPrice:
          type: number
          default: 0
        imageUrl:
          type: ["string", "null"]
        userId:
          type: string
          default: "demo-user"
      required:
        - name

    UpdateInventoryProductBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        quantity:
          type: ["integer", "null"]
        unitPrice:
          type: ["number", "null"]
        imageUrl:
          type: ["string", "null"]

    InventoryAuditLog:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        productId:
          type: ["integer", "null"]
        productName:
          type: ["string", "null"]
        action:
          type: string
          enum: [added, removed, edited, deleted]
        delta:
          type: ["integer", "null"]
        note:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        isVerified:
          type: boolean
        verifiedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - action
        - createdAt

    ScanInventoryItemBody:
      type: object
      properties:
        imageBase64:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
      required: []

    ScanInventoryItemResponse:
      type: object
      properties:
        suggestedName:
          type: string
        confidence:
          type: ["number", "null"]
        labels:
          type: array
          items:
            type: string
        isMock:
          type: boolean
      required:
        - suggestedName
        - isMock
        - labels

    InventorySummary:
      type: object
      properties:
        totalProducts:
          type: integer
        lowStockCount:
          type: integer
        totalValue:
          type: number
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
        recentActivity:
          type: integer
      required:
        - totalProducts
        - lowStockCount
        - totalValue
        - categories
        - recentActivity

    InventoryCheckoutBody:
      type: object
      properties:
        successUrl:
          type: string
        cancelUrl:
          type: string
        userId:
          type: ["string", "null"]
      required:
        - successUrl
        - cancelUrl

    BillingPortalBody:
      type: object
      properties:
        customerId:
          type: string
        returnUrl:
          type: string
      required:
        - customerId
        - returnUrl

    BillingPortalResponse:
        - name
        - isVerified
        - createdAt

    StockSwapListing:
      type: object
      properties:
        id:
          type: string
        shopId:
          type: string
        shopName:
          type: ["string", "null"]
        shopVerified:
          type: boolean
        title:
          type: string
        category:
          type: string
        brand:
          type: ["string", "null"]
        originalPrice:
          type: number
        discountPrice:
          type: number
        expiryDate:
          type: ["string", "null"]
        quantity:
          type: integer
        condition:
          type: string
        imageUrl:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        isBoosted:
          type: boolean
        boostedUntil:
          type: ["string", "null"]
          format: date-time
        distanceKm:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - shopId
        - title
        - category
        - originalPrice
        - discountPrice
        - quantity
        - condition
        - isBoosted
        - shopVerified
        - createdAt

    StockSwapMessage:
      type: object
      properties:
        id:
          type: string
        listingId:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - listingId
        - senderId
        - receiverId
        - content
        - createdAt

    StockSwapUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isVerified:
          type: boolean
        termsAccepted:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - isVerified
        - termsAccepted
        - createdAt

    CreateShopBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
      required:
        - name

    CreateListingBody:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        brand:
          type: ["string", "null"]
        originalPrice:
          type: number
        discountPrice:
          type: number
        expiryDate:
          type: ["string", "null"]
        quantity:
          type: integer
        condition:
          type: string
        imageUrl:
          type: ["string", "null"]
      required:
        - title
        - category
        - originalPrice
        - discountPrice
        - quantity
        - condition

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        receiverId:
          type: string
      required:
        - content
        - receiverId

    AISuggestionResponse:
      type: object
      properties:
        category:
          type: string
        brand:
          type: ["string", "null"]
        title:
          type: string
        confidence:
          type: number
      required:
        - category
        - title
        - confidence

    BoostListingResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url
        - sessionId

    StockSwapAuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/StockSwapUser"
        token:
          type: string
        shop:
          $ref: "#/components/schemas/StockSwapShop"
          nullable: true
      required:
        - user
        - token

    AcceptTermsBody:
      type: object
      properties:
        userId:
          type: string
      required:
        - userId
